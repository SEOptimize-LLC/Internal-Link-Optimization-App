# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — copy this file to .streamlit/secrets.toml and fill in your values
# secrets.toml is gitignored and should NEVER be committed
# ─────────────────────────────────────────────────────────────────────────────

[google]
client_id = "YOUR_GOOGLE_OAUTH_CLIENT_ID"
client_secret = "YOUR_GOOGLE_OAUTH_CLIENT_SECRET"

# For local development:
redirect_uri = "http://localhost:8501"

# For Streamlit Cloud deployment, comment out the line above and use:
# redirect_uri = "https://your-app-name.streamlit.app"


# ─────────────────────────────────────────────────────────────────────────────
# Other required secrets
# ─────────────────────────────────────────────────────────────────────────────

OPENROUTER_API_KEY = "sk-or-your-key-here"

SUPABASE_URL = "https://your-project.supabase.co"
SUPABASE_SERVICE_KEY = "sb_secret_your-key-here"
